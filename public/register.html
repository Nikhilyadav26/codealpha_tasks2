<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Register — ShopEase</title>
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<header class="site-header">
  <div class="container nav-wrap">
    <a href="/index.html" class="logo">🛍️ ShopEase</a>
    <nav class="nav-links" style="margin-left:auto;">
      <a href="/index.html">Home</a>
      <a href="/cart.html" class="cart-badge">Cart <span class="cart-count" id="cart-count">0</span></a>
      <span id="nav-auth-slot" style="display:flex; gap:16px; align-items:center;"></span>
    </nav>
  </div>
</header>

<main class="container">
  <form class="form-card" id="register-form">
    <h2>Create your account</h2>
    <div id="alert-box"></div>
    <div class="form-group">
      <label for="name">Full Name</label>
      <input type="text" id="name" required />
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" required />
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" minlength="6" required />
      <small style="color: var(--muted);">At least 6 characters</small>
    </div>
    <button type="submit" class="btn btn-primary btn-block" id="register-btn">Register</button>
    <p class="form-footer-note">Already have an account? <a href="/login.html">Login here</a></p>
  </form>
</main>

<footer>&copy; 2026 ShopEase</footer>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
</body>
</html>
