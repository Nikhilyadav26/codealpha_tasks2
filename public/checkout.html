<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Checkout — ShopEase</title>
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<header class="site-header">
  <div class="container nav-wrap">
    <a href="/index.html" class="logo">🛍️ ShopEase</a>
    <nav class="nav-links" style="margin-left:auto;">
      <a href="/index.html">Home</a>
      <a href="/cart.html" class="cart-badge">Cart <span class="cart-count" id="cart-count">0</span></a>
      <span id="nav-auth-slot" style="display:flex; gap:16px; align-items:center;"></span>
    </nav>
  </div>
</header>

<main class="container" style="margin-top:30px;">
  <h1>Checkout</h1>
  <div id="alert-box"></div>

  <div style="display:grid; grid-template-columns: 1.2fr 1fr; gap:40px; align-items:start;">
    <form id="checkout-form" class="form-card" style="margin:0;">
      <h2>Shipping Details</h2>
      <div class="form-group">
        <label for="shipping_name">Full Name</label>
        <input type="text" id="shipping_name" required />
      </div>
      <div class="form-group">
        <label for="shipping_address">Address</label>
        <input type="text" id="shipping_address" required />
      </div>
      <div class="form-group">
        <label for="shipping_city">City</label>
        <input type="text" id="shipping_city" required />
      </div>
      <div class="form-group">
        <label for="shipping_zip">ZIP / Postal Code</label>
        <input type="text" id="shipping_zip" required />
      </div>
      <button type="submit" class="btn btn-accent btn-block" id="place-order-btn">Place Order</button>
    </form>

    <div id="order-summary" class="cart-summary" style="margin:0;">
      <p>Loading order summary...</p>
    </div>
  </div>
</main>

<footer>&copy; 2026 ShopEase</footer>

<script src="/js/api.js"></script>
<script src="/js/checkout.js"></script>
</body>
</html>
